        // ==========================================
        // UPDATED: ADD TO CART WITH VARIANT SUPPORT
        // ==========================================
        function getVariantErrorMessage(variants) {
            if (!variants || variants.length === 0) {
                return (appData.language === 'bn') ? 'দয়া করে ভ্যারিয়েন্ট সিলেক্ট করুন' : 'Please select a variant';
            }

            const firstName = variants[0].name.toLowerCase().trim();
            let type = 'color'; 

            if (firstName.match(/(kg|g|ml|l|গ্রাম|কেজি|মিলি|লিটার)$/)) {
                type = 'weight';
            }
            else if (
                firstName.match(/^(ছোট|মাঝারি|বড়|এস|এম|এল|এক্সএল)$/) || 
                firstName.match(/^[a-z]{1,3}$/) || 
                (firstName.match(/^[0-9]+$/) || firstName.match(/[০-৯]+/))
            ) {
                type = 'size';
            }

            if (appData.language === 'bn') {
                if (type === 'weight') return "দয়া করে আপনার প্রয়োজনীয় ওজন সিলেক্ট করুন।";
                if (type === 'size') return "দয়া করে আপনার সাইজ সিলেক্ট করুন।";
                if (type === 'color') return "দয়া করে আপনার পছন্দের রঙ সিলেক্ট করুন।";
            } else {
                if (type === 'weight') return "Please select required weight.";
                if (type === 'size') return "Please select your size.";
                if (type === 'color') return "Please select your preferred color.";
            }
            
            return (appData.language === 'bn') ? 'দয়া করে ভ্যারিয়েন্ট সিলেক্ট করুন' : 'Please select a variant';
        }

        function addToCart(product, qty = 1) {
            if (product.totalstock <= 0) {
                 return Swal.fire('Sorry', t('out_stock'), 'info');
            }

            let selectedVariantData = null;
            let finalPrice = parseFloat(product.discountprice || product.price);

            if (product.variants && product.variants.length > 0) {
                const activeBtn = document.querySelector('.variant-btn.active');
                if (!activeBtn) {
                    const errorMsg = getVariantErrorMessage(product.variants);
                    return Swal.fire('Warning', errorMsg, 'warning');
                }
                
                const vName = activeBtn.getAttribute('data-name');
                const vPrice = parseFloat(activeBtn.getAttribute('data-price'));
                const vStock = parseInt(activeBtn.getAttribute('data-stock'));

                if (vStock < qty) {
                    return Swal.fire('Sorry', `Insufficient stock for ${vName}. Available: ${vStock}`, 'info');
                }

                selectedVariantData = vName;
                finalPrice = vPrice; 
            }

            const uniqueId = product.id + '_' + (selectedVariantData || 'Default');
            const existing = appData.cart.find(i => i.uniqueId === uniqueId);
            
            if (existing) {
                if ((existing.quantity || existing.qty) + qty > 3) return Swal.fire(t('limit'), t('max_items'), 'warning');
                if(existing.quantity) existing.quantity += qty;
                else existing.qty += qty;
            } else {
                if (appData.cart.length >=5) return Swal.fire(t('limit'), t('cart_full'), 'warning');
                appData.push({ 
                    ...product, 
                    quantity: qty, 
                    uniqueId: uniqueId,
                    selectedVariant: selectedVariantData,
                    price: finalPrice
                });
            }
            
            resetCouponLogic(); 
            
            // gtag event placeholder
            // logEvent(...)

            updateCartBadge();
            updateOrderSummary();
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            Toast.fire({ icon: 'success', title: t('added_cart') });
        }

        function quickAdd(id) {
            const p = appData.products.find(x => x.id == id);
            if (p) addToCart(p);
        }

        function updateQty(idx, delta) {
            const item = appData.cart[idx];
            const currentQty = item.quantity || item.qty;
            const newQty = currentQty + delta;
            
            if (newQty < 1) return;

            if (newQty > 3) {
                Swal.fire(t('limit'), t('max_items'), 'warning');
                return; 
            }
            
            if(item.quantity) item.quantity = newQty;
            else item.qty = newQty;
            
            updateCartBadge();
            resetCouponLogic(); 
            if(document.getElementById('cartPageItems')) updateCartPageUI();
            if(document.getElementById('cartItems')) updateCartSidebarUI();
            updateOrderSummary();
        }

        function removeItem(idx) {
            appData.cart.splice(idx,1);
            resetCouponLogic(); 
            updateCartBadge();
            updateOrderSummary();
            if(document.getElementById('cartPageItems')) updateCartPageUI();
            if(document.getElementById('cartItems')) updateCartSidebarUI();
        }

        // ================= UPDATED FEATURE: Buy Now =================
        function buyNow(product, qty = 1) {
            if (product.totalstock <= 0) {
                 return Swal.fire('Sorry', t('out_stock'), 'info');
            }

            appData.cart.forEach(item => item.selected = false);

            let selectedVariantData = null;
            let finalPrice = parseFloat(product.discountprice || product.price);

            if (product.variants && product.variants.length > 0) {
                const activeBtn = document.querySelector('.variant-btn.active');
                if (!activeBtn) {
                    const errorMsg = getVariantErrorMessage(product.variants);
                    return Swal.fire('Warning', errorMsg, 'warning');
                }
                const vName = activeBtn.getAttribute('data-name');
                const vPrice = parseFloat(activeBtn.getAttribute('data-price'));
                selectedVariantData = vName;
                finalPrice = vPrice;
            }

            const uniqueId = product.id + '_' + (selectedVariantData || 'Default');

            const existing = appData.cart.find(i => i.uniqueId === uniqueId);
            
            if (existing) {
                if(existing.quantity) existing.quantity = qty;
                else existing.qty = qty;
                existing.selected = true;
            } else {
                if (appData.cart.length >=5) return Swal.fire(t('limit'), t('cart_full'), 'warning');
                appData.cart.push({ 
                    ...product, 
                    quantity: qty, 
                    selected: true,
                    uniqueId: uniqueId,
                    selectedVariant: selectedVariantData,
                    price: finalPrice
                });
            }

            localStorage.setItem('cart', JSON.stringify(appData.cart));
            updateCartBadge();
            updateOrderSummary();
            
            // logEvent(...)

            navigateTo('#cart');
        }

            const selectedItems = appData.cart.filter(item => item.selected !== false);

            navigateTo('#checkout');

                    const next = (idx + 1) % appData.banners.length;
                    scrollToSlide(next);

            dots.forEach((d, i) => d.className = `w-2 h-2 rounded-full transition-colors ${i===idx?'bg-[var(--primary-color)]':'bg-white/50'}`);

                stickyBuyNowBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                stickyBuyNowBtn.classList.remove('bg-primary', 'hover:opacity-90');

                variantSection.classList.remove('hidden');

                    <button class="variant-btn px-4 py-2 rounded-lg text-sm font-medium transition-all ${v.stock <= 0 ? 'opacity-50 cursor-not-allowed' : ''}"

                        data-price="${v.price}"

                        onclick="selectVariant(this, ${mainPrice})">
                        ${v.name}
                    </button>
                `).join('');
                
                appData.currentSelectedVariant = null; 
                
                const hasOutOfStockVariant = variants.some(v => v.stock <= 0);
                if(hasOutOfStockVariant && p.totalstock > 0) {
                     stockEl.innerHTML = '<i class="fas fa-box-open mr-2"></i> Limited Stock';
                }

            } else {
                variantSection.classList.add('hidden');
                document.getElementById('productPrice').textContent = `৳ ${mainPrice}`;
            }

            const gallery = document.getElementById('galleryContainer');
            const images = [p.imagemain, p.image2, p.image3, p.image4, p.image5].filter(i => i);
            gallery.innerHTML = images.map((img, i) => `<div class="gallery-slide w-full h-full shrink-0"><img src="${img}" class="w-full h-full object-cover" loading="lazy"></div>`).join('');

            }
            document.getElementById('galleryCounter').textContent = `1/${images.length + (p.videourl?1:0)}`;
            gallery.onscroll = () => {
                const idx = Math.round(gallery.scrollLeft / gallery.clientWidth);

            };

            document.getElementById('decreaseQty').onclick = () => { if(qty>1) { qty--; qtyEl.textContent=qty; }};
            document.getElementById('increaseQty').onclick = () => { 
                let maxStock = p.totalstock;
                if(appData.currentSelectedVariant) {
                    const v = variants.find(v => v.name === appData.currentSelectedVariant);
                    if(v) maxStock = v.stock;
                }

                if(qty<maxStock && qty<3) { 
                    qty++; qtyEl.textContent=qty; 
                } else if (qty>=3) { 
                    Swal.fire(t('limit'), t('max_items'), 'warning'); 
                } else {
                    Swal.fire('Info', 'Max stock reached', 'info');
                }
            };
            
            addToCartBtn.onclick = () => addToCart(p, qty);
            stickyBuyNowBtn.onclick = () => buyNow(p, qty);

        async function placeOrder() {
            const name = document.getElementById('checkoutName').value.trim();
            const phone = document.getElementById('checkoutPhone').value.trim();
            const district = document.getElementById('checkoutDistrict').value;
            const upazila = document.getElementById('checkoutUpazila').value;
            const address = document.getElementById('checkoutAddress').value.trim();
            
            if (!phone.match(/^01\d{9}$/)) return Swal.fire('Error', t('invalid_phone'), 'error');

            const selectedItems = appData.cart.filter(item => item.selected !== false);
            
            if (selectedItems.length === 0) return Swal.fire('Error', 'Please select at least one item', 'error');
            if (!name || !phone || !district || !upazila || !address) return Swal.fire('Missing', t('fill_all'), 'error');
            
            const usePoints = document.getElementById('ptsToggle').checked;

            const orderData = {
                userId: appData.user.userid, 
                fullname: name, 
                phone, 
                district, 
                upazila, 
                address,
                cartItems: selectedItems, 
                couponCode: appData.coupon?.code || '',
                usePoints: usePoints,
                sessionToken: appData.sessionToken,
                userEmail: appData.user.email
            };

            Swal.fire({ title: t('processing'), didOpen: () => Swal.showLoading() });
            
            try {
                const response = await fetch('/api/placeOrder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderData })
                });
                const res = await response.json();

                Swal.close();
                if (res.success) {
                    appData.cart = appData.cart.filter(item => item.selected === false);
                    allOrdersCache = []; 
                    appData.coupon = null;
                    appData.pointsDiscount = 0;
                    appData.user.currentpoints -= res.pointsUsed;
                    localStorage.setItem('user', JSON.stringify(appData.user));
                    
                    localStorage.setItem('cart', JSON.stringify(appData.cart));
                    localStorage.removeItem('coupon');
                    Swal.fire('Success', `${t('order_placed')} ID: ${res.orderId}`, 'success').then(() => {
                        updateCartBadge();
                        navigateTo('#home');
                    });
                } else { 
                    Swal.fire('Failed', res.error, 'error'); 
                }
            } catch (err) {
                Swal.close();
                Swal.fire('Error', 'Network Error', 'error');
            }
        }

        let forgotOtpTimerInterval = null;

        async function handleForgotPassword() {
            const email = document.getElementById('forgotEmail').value.trim();
            const otp = document.getElementById('forgotOtp').value.trim();
            const newPass = document.getElementById('newPassword').value;
            const btn = document.getElementById('forgotBtn');
            
            if (!otp) {
                if(!email) return Swal.fire('Error', 'Email required', 'error');
                if (!isValidEmail(email)) return Swal.fire('Error', t('invalid_email_format'), 'error');
                
                const originalText = btn.textContent;
                btn.textContent = t('sending');
                btn.disabled = true;

                try {
                    const response = await fetch('/api/sendOtp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const res = await response.json();

                    btn.textContent = originalText; 
                    btn.disabled = false;

                    if (res.remainingSeconds !== undefined) {
                        Swal.fire({
                            icon: 'info',
                            title: 'Please wait',
                            text: `You requested an OTP recently. Please wait ${res.remainingSeconds} seconds before trying again.`,
                            confirmButtonColor: appData.settings.themecolor || '#2563eb'
                        });
                        document.getElementById('otpSection').classList.remove('hidden'); 
                        btn.textContent = t('reset_pass');
                        startForgotOtpTimer(res.remainingSeconds);
                        return;
                    }

                    if(res.success) { 
                        Swal.fire({ icon: 'success', title: t('otp_sent_msg'), text: t('check_inbox'), timer: 2000, showConfirmButton: false });
                        document.getElementById('otpSection').classList.remove('hidden'); 
                        btn.textContent = t('reset_pass');
                        startForgotOtpTimer();
                    }
                    else { 
                        Swal.fire('Error', res.error, 'error'); 
                    }
                } catch (err) {
                    btn.textContent = originalText; 
                    btn.disabled = false;
                    Swal.fire('Error', 'Network Error', 'error');
                }
                    
            } else {
                if (!newPass || newPass.length < 6) return Swal.fire('Error', 'Valid password required', 'error');
                
                btn.textContent = "Reseting...";
                btn.disabled = true;

                try {
                    const response = await fetch('/api/resetPassword', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, otp, newPassword: newPass })
                    });
                    const res = await response.json();

                    btn.disabled = false;
                    if(res.success) {
                        Swal.fire('Success', t('reset_success') + '! ' + t('please_login'), 'success').then(() => {
                            navigateTo('#login');
                        });
                    }
                    else Swal.fire('Error', res.error, 'error'); 
                } catch (err) {
                    btn.disabled = false;
                    Swal.fire('Error', 'Network Error', 'error');
                }
            }
        }

        function startForgotOtpTimer(startSeconds) {
            let duration = startSeconds !== undefined ? startSeconds : (5 * 60);
            const timerDisplay = document.getElementById('forgotOtpTimerDisplay');
            const resendBtn = document.getElementById('forgotResendOtpBtn');
            
            forgotOtpResendEnabled = false;
            resendBtn.disabled = true;
            resendBtn.classList.add('text-gray-400', 'cursor-not-allowed');
            resendBtn.classList.remove('text-primary', 'cursor-pointer', 'underline');
            
            timerDisplay.classList.remove('hidden');
            resendBtn.classList.remove('hidden');

            clearInterval(forgotOtpTimerInterval);

            forgotOtpTimerInterval = setInterval(() => {
                const minutes = Math.floor(duration / 60);
                const seconds = duration % 60;
                const minStr = minutes < 10 ? '0' + minutes : minutes;
                const secStr = seconds < 10 ? '0' + seconds : seconds;
                
                timerDisplay.textContent = `${minStr}:${secStr}`;

                if (duration <= 0) {
                    clearInterval(forgotOtpTimerInterval);
                    timerDisplay.textContent = t('otp_expired');
                    forgotOtpResendEnabled = true;
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('text-gray-400', 'cursor-not-allowed');
                    resendBtn.classList.add('text-primary', 'cursor-pointer', 'underline');
                    resendBtn.textContent = t('resend_otp');
                }
                duration--;
            }, 1000);
        }

        async function handleResendForgotOtp() {
            if (!forgotOtpResendEnabled) return;
            const email = document.getElementById('forgotEmail').value.trim();
            if(!email) return Swal.fire('Error', 'Email missing', 'error');

            const resendBtn = document.getElementById('forgotResendOtpBtn');
            resendBtn.disabled = true;

            try {
                const response = await fetch('/api/sendOtp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const res = await response.json();

                if (res.remainingSeconds !== undefined) {
                    Swal.fire({
                        icon: 'info',
                        title: 'Please wait',
                        text: `Please wait ${res.remainingSeconds} seconds.`,
                        timer: 1500,
                        showConfirmButton: false
                    });
                    startForgotOtpTimer(res.remainingSeconds);
                } else if(res.success) {
                    Swal.fire({ icon: 'success', title: 'OTP Sent', text: 'Check your inbox', timer: 1500, showConfirmButton: false });
                    startForgotOtpTimer();
                } else {
                    Swal.fire('Error', res.error, 'error');
                    resendBtn.disabled = false;
                }
            } catch (err) {
                Swal.fire('Error', 'Network Error', 'error');
                resendBtn.disabled = false;
            }
        }

        function applyFilters() {
            const category = document.getElementById('filterCategory').value;
            const subCategory = document.getElementById('filterSubCategory').value;
            const priceRange = document.getElementById('filterPrice').value;
            const sortOrder = document.getElementById('filterSort').value;
            const container = document.getElementById('homeAllProductsList');
            const titleRow = document.getElementById('homeAllProductsTitleRow');
            const titleH1 = titleRow ? titleRow.querySelector('h1') : null;
            const pagination = document.getElementById('homePaginationControls');

            if (!container) {
                toggleFilter();
                navigateTo('#home');
                return;
            }

            let filtered = appData.products;

            if (category !== 'all') {
                if (subCategory && subCategory !== 'all') {
                    filtered = filtered.filter(p => p.category === subCategory);
                } else {
                    filtered = filtered.filter(p => p.category.startsWith(category));
                }
            }

            if (priceRange !== 'all') {
                const [minStr, maxStr] = priceRange.split('-');
                const min = parseInt(minStr);
                
                if (priceRange === '2001-above') {
                    filtered = filtered.filter(p => (p.discountprice || p.price) > 2000);
                } else {
                    const max = parseInt(maxStr);
                    filtered = filtered.filter(p => {
                        const price = p.discountprice || p.price;
                        return price >= min && price <= max;
                    });
                }
            }

            if (sortOrder === 'low-high') {
                filtered.sort((a, b) => (a.discountprice || a.price) - (b.discountprice || b.price));
            } else if (sortOrder === 'high-low') {
                filtered.sort((a, b) => (b.discountprice || a.price) - (a.discountprice || b.price));
            }

            document.getElementById('homeHeroSection').style.display = 'none';
            document.getElementById('featuredProducts').style.display = 'none';
            titleRow.classList.remove('hidden');

            if (filtered.length === 0) {
                if(container) {
                    container.className = 'flex flex-col items-center justify-center w-full py-12 animate-fade-in';
                    container.innerHTML = `
                        <div class="text-center">
                            <i class="fas fa-box-open text-5xl text-gray-200 mb-4"></i>
                            <p class="text-sm text-gray-500 font-medium">${t('filter_empty')}</p>
                        </div>
                    `;
                }
                if(pagination) pagination.innerHTML = ''; 
                if(titleH1) titleH1.innerText = t('no_results');
            } else {
                if(container) {
                    container.className = 'grid grid-cols-2 gap-3';
                    container.innerHTML = filtered.map(p => createProductCard(p)).join('');
                }
                if(pagination) pagination.innerHTML = ''; 
                if(titleH1) titleH1.innerText = "FILTERED PRODUCTS";
            }

            document.getElementById('filterModal').classList.add('hidden');
            if(titleRow) titleRow.scrollIntoView({behavior: 'smooth'});
        }

        function getSocialBrandColor(iconClass) {
            if(!iconClass) return 'bg-gray-700';
            const lower = iconClass.toLowerCase();
            if (lower.includes('facebook')) return 'bg-[#1877F2]';
            if (lower.includes('whatsapp')) return 'bg-[#25D366]';
            if (lower.includes('youtube')) return 'bg-[#FF0000]';
            if (lower.includes('tiktok')) return 'bg-[#000000]';
            if (lower.includes('instagram')) return 'bg-[#E1306C]';
            if (lower.includes('twitter') || lower.includes('x')) return 'bg-[#000000]';
            if (lower.includes('linkedin')) return 'bg-[#0077B5]';
            return 'bg-gray-700';
        }

        // ================= FEATURE: Popup Slider Logic =================
        let popupState = {
            items: [],
            currentIndex: 0,
            intervalId: null,
            autoSlideDelay: 4000
        };

        function initPopupSystem() {
            if (sessionStorage.getItem('popupClosed')) {
                return;
            }

            popupState.items = appData.popups.filter(p => p.status === 'active');

            if (popupState.items.length === 0) return;

            renderPopupSlides();

            const overlay = document.getElementById('popup-overlay');
            
            overlay.classList.remove('hidden');
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0');

            if (popupState.items.length > 1) {
                popupState.intervalId = setInterval(nextPopupSlide, popupState.autoSlideDelay);
            } else {
                document.getElementById('btn-prev').style.display = 'none';
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('popup-dots').style.display = 'none';
            }
        }

        function renderPopupSlides() {
            const slider = document.getElementById('popup-slider');
            const dotsContainer = document.getElementById('popup-dots');
            
            slider.innerHTML = '';
            dotsContainer.innerHTML = '';

            popupState.items.forEach((popup, index) => {
                const slide = document.createElement('div');
                slide.className = 'w-full flex-shrink-0 relative cursor-pointer';
                slide.onclick = () => handlePopupAction(popup);

                if (popup.popupimage) {
                    const img = document.createElement('img');
                    img.src = popup.popupimage;
                    img.className = 'w-full h-auto object-contain'; 
                    img.alt = 'Popup Offer';
                    slide.appendChild(img);
                }

                slider.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = `popup-dot w-2 h-2 rounded-full ${index === 0 ? 'bg-[var(--primary-color)]' : 'bg-white/50'}`;
                dot.onclick = (e) => {
                    e.stopPropagation();
                    goToPopupSlide(index);
                };
                dotsContainer.appendChild(dot);
            });
        }

        function updatePopupSlider() {
            const slider = document.getElementById('popup-slider');
            slider.style.transform = `translateX(-${popupState.currentIndex * 100}%)`;

            const dots = document.querySelectorAll('.popup-dot');
            dots.forEach((dot, index) => {
                dot.className = `popup-dot w-2 h-2 rounded-full transition-all duration-300 ${index === popupState.currentIndex ? 'bg-[var(--primary-color)] scale-125' : 'bg-white/50'}`;
            });
        }

        function nextPopupSlide() {
            popupState.currentIndex = (popupState.currentIndex + 1) % popupState.items.length;
            updatePopupSlider();
        }

        function prevPopupSlide() {
            popupState.currentIndex = (popupState.currentIndex - 1 + popupState.items.length) % popupState.items.length;
            updatePopupSlider();
        }

        function goToPopupSlide(index) {
            popupState.currentIndex = index;
            updatePopupSlider();
            resetPopupAutoSlide();
        }

        function resetPopupAutoSlide() {
            clearInterval(popupState.intervalId);
            if (popupState.items.length > 1) {
                popupState.intervalId = setInterval(nextPopupSlide, popupState.autoSlideDelay);
            }
        }

        function closePopup() {
            const overlay = document.getElementById('popup-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);

            clearInterval(popupState.intervalId);
            sessionStorage.setItem('popupClosed', 'true');
        }

        function handlePopupAction(popup) {
            // logEvent(...)
            let targetUrl = '';
            if (popup.targettype === 'product') {
                targetUrl = `#product?id=${popup.targetvalue}`;
            } else if (popup.targettype === 'category') {
                targetUrl = `#category?name=${encodeURIComponent(popup.targetvalue)}`;
            } else if (popup.targettype === 'url') {
                window.open(popup.targetvalue, '_blank');
                closePopup();
                return;
            } else {
                closePopup();
                return;
            }

            if (targetUrl) {
                navigateTo(targetUrl);
                closePopup();
            }
        }

        document.getElementById('btn-close').addEventListener('click', closePopup);
        document.getElementById('btn-next').addEventListener('click', (e) => {
            e.stopPropagation();
            nextPopupSlide();
            resetPopupAutoSlide();
        });
        document.getElementById('btn-prev').addEventListener('click', (e) => {
            e.stopPropagation();
            prevPopupSlide();
            resetPopupAutoSlide();
        });

        let currentReviewProductId = null;

        function toggleReviewsView() {
            isReviewsExpanded = !isReviewsExpanded;
            renderReviews(currentReviewProductId);
        }

        function renderReviews(productId) {
            currentReviewProductId = productId;
            if(productId !== currentReviewProductId) isReviewsExpanded = false;

            const listContainer = document.getElementById('reviewsList');
            const noMsg = document.getElementById('noReviewsMsg');
            const formContainer = document.getElementById('reviewFormContainer');
            const loginPrompt = document.getElementById('reviewLoginPrompt');
            const viewAllBtnContainer = document.getElementById('viewAllReviewsBtnContainer');
            const viewAllBtn = viewAllBtnContainer ? viewAllBtnContainer.querySelector('button') : null;

            document.getElementById('selectedRating').value = '0';
            updateStarVisuals(0);
            document.getElementById('reviewComment').value = '';

            if(appData.user) {
                formContainer.classList.remove('hidden');
                loginPrompt.classList.add('hidden');
            } else {
                formContainer.classList.add('hidden');
                loginPrompt.classList.remove('hidden');
            }

            let reviews = appData.reviews.filter(r => r.productid == productId).sort((a,b) => new Date(b.date) - new Date(a.date));

            let displayReviews = reviews;
            if (!isReviewsExpanded && reviews.length >3) {
                displayReviews = reviews.slice(0,3);
                viewAllBtnContainer.classList.remove('hidden');
                viewAllBtn.innerText = t('view_all'); 
                viewAllBtn.dataset.i18n = 'view_all';
            } else {
                viewAllBtnContainer.classList.remove('hidden');
                viewAllBtn.innerText = t('show_less'); 
                viewAllBtn.dataset.i18n = 'show_less';
            }
            
            if (reviews.length <= 3) {
                viewAllBtnContainer.classList.add('hidden');
            }

            if (reviews.length === 0) {
                listContainer.innerHTML = '';
                noMsg.classList.remove('hidden');
            } else {
                noMsg.classList.add('hidden');
                listContainer.innerHTML = displayReviews.map(r => {
                    let starsHtml = '';
                    for(let i=1; i<=5; i++) {
                        if(i <= r.rating) starsHtml += '<span class="text-yellow-400 text-xs">★</span>';
                        else starsHtml += '<span class="text-gray-300 text-xs">★</span>';
                    }

                    let dateDisplay = 'Unknown Date';
                    try {
                        if (r.date) {
                            let dateObj = new Date(r.date);
                            if (!isNaN(dateObj.getTime())) {
                                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                                dateDisplay = dateObj.toLocaleDateString('en-GB', options);
                            } else {
                                dateDisplay = r.date;
                            }
                        }
                    } catch (e) {
                        dateDisplay = r.date || 'Invalid Date';
                    }

                    return `
                        <div class="bg-white border rounded-lg p-3 shadow-sm">
                            <div class="flex justify-between items-start mb-1">
                                <h5 class="font-bold text-sm text-gray-800">${r.customername}</h5>
                                <div class="flex">${starsHtml}</div>
                            </div>
                            <p class="text-xs text-gray-600 mt-2 leading-relaxed">${r.comment}</p>
                            <p class="text-[10px] text-gray-400 mt-1 text-right">${dateDisplay}</p>
                        </div>
                    `;
                }).join('');
            }
        }

        function setupStarInteraction() {
            const stars = document.querySelectorAll('#reviewStarsInput span');
            stars.forEach(star => {
                star.addEventListener('click', function() {
                    const val = this.getAttribute('data-val');
                    document.getElementById('selectedRating').value = val;
                    updateStarVisuals(val);
                });
            });
        }

        function updateStarVisuals(rating) {
            const stars = document.querySelectorAll('#reviewStarsInput span');
            stars.forEach(star => {
                const val = star.getAttribute('data-val');
                if(val <= rating) {
                    star.classList.remove('text-gray-300');
                    star.classList.add('text-yellow-400');
                } else {
                    star.classList.add('text-gray-300');
                    star.classList.remove('text-yellow-400');
                }
            });
        }

        async function handleReviewSubmit() {
            const rating = document.getElementById('selectedRating').value;
            const comment = document.getElementById('reviewComment').value.trim();

            if(rating === '0' || rating == 0) {
                return Swal.fire('Warning', t('your_rating') + ' is required', 'warning');
            }
            if(!comment) {
                return Swal.fire('Warning', t('your_comment') + ' is required', 'warning');
            }

            Swal.fire({
                title: t('processing'),
                didOpen: () => Swal.showLoading()
            });

            const reviewData = {
                userId: appData.user.userid,
                productId: currentReviewProductId,
                customerName: appData.user.fullname,
                rating: parseInt(rating),
                comment: comment
            };

            try {
                const response = await fetch('/api/submitReview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reviewData)
                });
                const res = await response.json();

                Swal.close();
                if(res.success) {
                    Swal.fire({
                        icon: 'success',
                        title: res.message,
                        text: t('review_success'),
                        timer: 2000,
                        showConfirmButton: false
                    });
                    document.getElementById('reviewComment').value = '';
                    document.getElementById('selectedRating').value = '0';
                    updateStarVisuals(0);
                    
                    appData.reviews.unshift({
                        date: new Date().toISOString().split('T')[0], 
                        productid: currentReviewProductId,
                        customername: appData.user.fullname,
                        rating: parseInt(rating),
                        comment: comment,
                        status: 'pending' 
                    });
                    renderReviews(currentReviewProductId);
                } else {
                    Swal.fire('Error', res.error, 'error');
                }
            } catch (err) {
                Swal.close();
                Swal.fire('Error', 'Network Error', 'error');
            }
        }

        // ==========================================
        // MIX BOX - ULTIMATE BACK BUTTON HANDLER (UNIVERSAL SCROLL FIX)
        // ==========================================

        let backPressCount = 0;
        let backPressTimeout;

        function maintainHistoryTrap() {
            if (!window.history.state || window.history.state.appState !== 'trap') {
                window.history.replaceState({ appState: 'base' }, '', window.location.href);
                window.history.pushState({ appState: 'trap' }, '', window.location.href);
            }
        }

        window.addEventListener('load', () => {
            const currentHash = window.location.hash;
            if (currentHash && currentHash !== '#home') {
                const currentUrl = window.location.href;
                window.history.replaceState({ appState: 'base' }, '', '#home');
                window.history.pushState({ appState: 'trap' }, '', '#home');
                window.history.pushState({ appState: 'base' }, '', currentUrl);
                window.history.pushState({ appState: 'trap' }, '', currentUrl);
            } else {
                maintainHistoryTrap();
            }
        });

        window.addEventListener('hashchange', maintainHistoryTrap);

        function isAnyModalOpen() {
            const isSwalOpen = typeof Swal !== 'undefined' && Swal.isVisible();
            const modalIds = ['filterModal', 'cartSidebar', 'popup-overlay', 'searchBar', 'refundModal', 'rewardModal', 'passwordModal'];
            const isOtherModalOpen = modalIds.some(id => {
                const el = document.getElementById(id);
                if (!el) return false;
                return !el.classList.contains('hidden') && !el.classList.contains('translate-x-full');
            });
            return isSwalOpen || isOtherModalOpen;
        }

        function closeAllModals() {
            if (typeof Swal !== 'undefined' && Swal.isVisible()) Swal.close();
            const modals = [
                { id: 'filterModal', closeFunc: typeof toggleFilter === 'function' ? toggleFilter : null },
                { id: 'cartSidebar', closeFunc: typeof hideCart === 'function' ? hideCart : null },
                { id: 'popup-overlay', closeFunc: typeof closePopup === 'function' ? closePopup : null },
                { id: 'searchBar', closeFunc: typeof toggleSearch === 'function' ? toggleSearch : null },
                { id: 'refundModal', closeFunc: null },
                { id: 'rewardModal', closeFunc: null },
                { id: 'passwordModal', closeFunc: null }
            ];
            modals.forEach(modal => {
                const el = document.getElementById(modal.id);
                if (el && (!el.classList.contains('hidden') || el.classList.contains('translate-x-0'))) {
                    if (modal.closeFunc) {
                        modal.closeFunc();
                    } else {
                        el.classList.add('hidden');
                    }
                }
            });
        }

        window.onpopstate = function(event) {
            if (event.state && event.state.appState === 'base') {
                
                if (isAnyModalOpen()) {
                    closeAllModals();
                    window.history.pushState({ appState: 'trap' }, '', window.location.href);

                    const targetY = appData.homeScrollPos || 0;
                    window.requestAnimationFrame(() => {
                        window.scrollTo(0, targetY);
                    });
                    return;
                }

                const currentHash = window.location.hash;

                if (currentHash === '' || currentHash === '#home') {
                    
                    if (appData.lastRoute && appData.lastRoute !== '#home') {
                        window.location.reload();
                        return;
                    }

                    if (backPressCount === 1) {
                        window.history.go(-2); 
                        return;
                    }

                    const savedScrollY = appData.homeScrollPos || 0;

                    backPressCount = 1;
                    window.history.pushState({ appState: 'trap' }, '', window.location.href); 

                    window.requestAnimationFrame(() => {
                        window.scrollTo(0, savedScrollY);
                    });

                    if (typeof Swal !== 'undefined') {
                        const siteLogo = (typeof appData !== 'undefined' && appData.settings && appData.settings.sitelogo) 
                                        ? appData.settings.sitelogo 
                                        : 'https://via.placeholder.com/20?text=Logo';

                        Swal.fire({
                            html: `
                                <div style="display: inline-flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.75); color: white; padding: 10px 20px; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 14px; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: max-content;">
                                    <img src="${siteLogo}" style="height: 20px; width: auto; object-fit: contain; display: block;">
                                    <span>${t('Press back again to exit')}</span>
                                </div>
                            `,
                            toast: true,
                            position: 'bottom',
                            showConfirmButton: false,
                            timer: 2000,
                            background: 'transparent',
                            color: '#ffffff',
                            customClass: {
                                popup: 'swal2-exit-custom' 
                            },
                            showClass: { popup: 'animate__animated animate__fadeInUp animate__faster' },
                            hideClass: { popup: 'animate__animated animate__fadeOutDown animate__faster' },
                            didOpen: (popup) => {
                                popup.style.position = 'fixed';
                                popup.style.bottom = '75px';
                                popup.style.left = '50%';
                                popup.style.transform = 'translateX(-50%)';
                                popup.style.margin = '0';
                                popup.style.width = 'max-content'; 
                                popup.style.padding = '0';
                                popup.style.display = 'block';
                            }
                        });
                    }

                    clearTimeout(backPressTimeout);
                    backPressTimeout = setTimeout(() => { backPressCount = 0; }, 2000);

                } else {
                    if (window.history.length <= 2) {
                        window.location.hash = '#home';
                    } else {
                        window.history.back();
                    }
                }
            } else {
                maintainHistoryTrap();
            }
        };

        function forceUnfreezeScroll() {
            const body = document.body;
            const app = document.getElementById('app');
            
            const isBodyLocked = body.style.overflow === 'hidden' || window.getComputedStyle(body).overflow === 'hidden';
            const isSwalOpen = typeof Swal !== 'undefined' && Swal.isVisible();

            const modalIds = ['cartOverlay', 'popup-overlay', 'filterModal', 'searchBar', 'skeletonLoader'];
            let isAnyCustomModalOpen = false;
            
            modalIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (!el.classList.contains('hidden')) {
                        if (id === 'cartSidebar' && el.classList.contains('translate-x-full')) {
                        } else {
                            isAnyCustomModalOpen = true;
                        }
                    }
                }
            });

            if (!isSwalOpen && !isAnyCustomModalOpen) {
                if (isBodyLocked) {
                    body.style.overflow = 'auto';
                    body.style.position = 'relative';
                    if(app) {
                        app.style.overflow = 'auto';
                        app.style.position = 'relative';
                    }
                }
            }
        }

        document.addEventListener('touchstart', forceUnfreezeScroll, { passive: true });
        document.addEventListener('mousedown', forceUnfreezeScroll, { passive: true });

        window.addEventListener('scroll', () => {
            if (document.body.style.overflow === 'hidden') {
                forceUnfreezeScroll();
            }
        }, { passive: true });
    </script>
</body>
</html>
